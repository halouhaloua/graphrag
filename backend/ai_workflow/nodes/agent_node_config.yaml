# 节点配置文件
# 定义所有可用的节点类型及其参数
# 每个节点类型包含type、name、description、output、params等字段
PythonExecuteNode:
  type: "python_execute"
  class: "src.nodes.python_execute.PythonExecuteNode"
  name: "Python/Shell代码执行"
  description: "Python/Shell代码执行组件，支持 Python3 代码和 Shell 脚本执行。执行结果必须通过 print 输出才能被接收。支持使用 Python 代码进行文件操作，文件的通用目录是 /app/data（此目录文件可通过网络请求访问，访问地址 http://host:port/app/data/{file_name}），技能目录是 /app/.proteus/skills（技能根目录）。支持变量传递、任何网络访问，适用于系统处理、demo 演示、金融数据爬取等场景。当缺少依赖时，请先使用 Python 代码安装依赖。"
  output:
    result: "执行结果（标准输出）"
    stdout: "标准输出内容"
    stderr: "标准错误内容（包含错误信息）"
    success: "执行是否成功"
  params:
    code:
      type: "str"
      required: true
      description: "要执行的代码，支持Python函数定义或Shell脚本"
    language:
      type: "str"
      required: true
      default: "python"
      description: "代码语言类型：python 或 shell"
    enable_network:
      type: "bool"
      required: true
      default: true
      description: "是否允许代码访问网络"
    variables:
      type: "dict"
      required: false
      default: {}
      description: "传递给代码的变量字典（仅Python3有效）"

SerperSearchNode:
  type: "serper_search"
  class: "src.nodes.serper_search.SerperSearchNode"
  name: "Serper搜索引擎"
  description: "Serper搜索引擎节点，可以搜索一些时下最新的信息，如新闻、论坛、博客等，如果需要更详细的信息，请自行根据link爬取网页内容"
  output:
    success: "搜索是否成功"
    results: "搜索结果列表，数组类型，每条结果包含字段为：title、link和snippet，如果需要网页正文内容，需要通过link爬取，这里只提供全文概要字段snippet"
    count: "结果数量"
    error: "错误信息(如果有)"
  params:
    query:
      type: "str"
      required: true
      description: "搜索关键词或者短语，需要精确的且明确的词语，不要一次搜索多个关键词"
    country:
      type: "str"
      required: false
      default: "cn"
      description: "搜索国家代码"
    language:
      type: "str"
      required: false
      default: "zh"
      description: "搜索语言代码"
    max_results:
      type: "int"
      required: false
      default: 20
      description: "最大搜索结果数量"

ArxivSearchNode:
  type: "arxiv_search"
  class: "src.nodes.arxiv_search.ArxivSearchNode"
  name: "Arxiv论文搜索"
  description: "搜索Arxiv论文库，返回最相关的5篇论文信息，包括标题、作者、摘要、发布日期、PDF链接等"
  output:
    success: "搜索是否成功"
    results: "论文搜索结果列表，数组类型，每篇论文包含：title(标题)、authors(作者列表)、summary(摘要)、content(正文)、published(发布日期)、pdf_url(PDF下载链接)、entry_id(论文ID)、primary_category(主要分类)"
    count: "返回的论文数量"
    error: "错误信息(如果有)"
  params:
    query:
      type: "str"
      required: true
      description: "搜索关键词，只支持英文关键词，支持Title、Author、Abstract等字段的搜索"

SerperScrapeNode:
  type: "web_crawler"
  class: "src.nodes.serper_scrape.SerperScrapeNode"
  name: "网络爬虫"
  description: "可以根据提供的网页链接爬取网页内容并返回"
  output:
    success: "执行状态"
    error: "错误信息" 
    content: "提取的正文内容"
  params:
    url:
      type: "str"
      required: true
      description: "需要抓取的网页链接"

WeatherForecastNode:
  type: "weather_forecast"
  class: "src.nodes.weather_forecast.WeatherForecastNode"
  name: "天气预报"
  description: "通过经纬度获取天气信息"
  output:
    success: "执行状态"
    error: "错误信息"
    data: "天气数据，包含当前天气、未来3天气和天气总结等信息"
  params:
    latitude:
      type: "float"
      required: false
      description: "纬度，与longitude配合使用"
    longitude:
      type: "float"
      required: false
      description: "经度，与latitude配合使用"

ApiCallNode:
  type: "api_call"
  class: "src.nodes.api_call.ApiCallNode"
  name: "API调用"
  description: "通用API调用节点，支持Bearer Token认证，可用于调用各类REST API接口"
  output:
    status: "HTTP状态码"
    success: "是否调用成功"
    data: "响应数据"
    headers: "响应头"
    error: "错误信息(如果有)"
  params:
    url:
      type: "str"
      required: true
      description: "API接口地址"
    method:
      type: "str"
      required: true
      description: "HTTP请求方法(GET, POST, PUT, DELETE等)"
    headers:
      type: "dict"
      required: false
      default: {}
      description: "请求头，键值对格式"
    body:
      type: "dict"
      required: false
      default: {}
      description: "请求体数据，JSON格式"
    bearer_token:
      type: "str"
      required: false
      description: "Bearer Token认证令牌"

SkillsExtractNode:
  type: "skills_extract"
  class: "src.nodes.skills_extract.SkillsExtractNode"
  name: "技能解析管理"
  description: "从技能目录中加载所有技能的名称和描述（技能列表功能）；根据技能名称获取技能详情，包括技能文件夹结构、skill.md完整内容（不截断）；根据技能名称和文件路径获取技能其他文件内容。"
  output:
    success: "操作是否成功"
    error: "错误信息(如果有)"
    data: "返回的数据，根据操作类型不同而不同"
  params:
    action:
      type: "str"
      required: true
      description: "操作类型：list（列出所有技能）、get（获取技能详情，包括文件夹结构和skill.md完整内容）、getContent（获取技能其他文件内容）"
      example: "list"
    skill_name:
      type: "str"
      required: false
      description: "技能名称（当action为get或getContent时必需）"
      example: "backend-dev-guidelines"
    file_path:
      type: "str"
      required: false
      description: "文件路径（当action为getContent时必需）"
      example: "templates/config.yaml"
    skills_dir:
      type: "str"
      required: false
      default: "/app/.proteus/skills"
      description: "技能目录路径，默认为/app/.proteus/skills"